<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chatverix — Login</title>

<style>
body {
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial;
  background:linear-gradient(180deg,#041021,#08121a);
  color:white;
}

.card {
  width:360px;
  background:#0f1c22;
  padding:25px;
  border-radius:12px;
  text-align:center;
}

input {
  width:100%;
  padding:10px;
  margin:6px 0;
  border:none;
  border-radius:8px;
  background:#051017;
  color:white;
}

button {
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  margin-top:8px;
  font-weight:bold;
  cursor:pointer;
}

.primary { background:#25D366; color:black; }

.google-btn {
  background:#fff;
  color:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
}

.google-btn img {
  width:18px;
}
</style>
</head>

<body>

<div class="card">
  <h1>Login</h1>

  <button id="googleBtn" class="google-btn">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg">
    Continue with Google
  </button>

  <p>or</p>

  <form id="loginForm">
    <input id="identifier" placeholder="Username or Email" required>
    <input id="password" type="password" placeholder="Password" required>
    <button class="primary">Login</button>
  </form>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  GoogleAuthProvider,
  signInWithPopup,
  signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import { getDatabase, ref, get, query, orderByChild, equalTo } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({
  apiKey: "AIzaSyAEWxTJ1loQkXM1ShwAAF1J15RQLlCgdGM",
  authDomain: "msgapp-262c9.firebaseapp.com",
  projectId: "msgapp-262c9",
  databaseURL: "https://msgapp-262c9-default-rtdb.asia-southeast1.firebasedatabase.app"
});

const auth = getAuth(app);
const db = getDatabase(app);
const provider = new GoogleAuthProvider();

/* GOOGLE LOGIN */
document.getElementById("googleBtn").onclick = async () => {
  try {
    await signInWithPopup(auth, provider);
    location.href = "index.html";
  } catch (e) {
    alert(e.message);
  }
};

/* LOGIN */
document.getElementById("loginForm").onsubmit = async (e) => {
  e.preventDefault();

  const id = identifier.value.trim();
  const pass = password.value;

  try {
    let email = id;

    if (!id.includes("@")) {
      const q = query(ref(db, "users"), orderByChild("username"), equalTo(id));
      const snap = await get(q);

      let user = null;
      snap.forEach(s => user = s.val());

      if (!user) throw new Error("User not found");

      email = user.email;
    }

    await signInWithEmailAndPassword(auth, email, pass);

    location.href = "index.html";

  } catch (e) {
    alert(e.message);
  }
};
</script>

</body>
</html>
