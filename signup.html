<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chatverix — Sign Up</title>

<style>
:root {
  --bg:#071018;
  --panel:#0f1c22;
  --muted:#9aa7ad;
  --accent:#25D366;
}

body {
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial;
  background:linear-gradient(180deg,#041021,#08121a);
  color:#fff;
}

.card {
  width:360px;
  background:var(--panel);
  padding:25px;
  border-radius:12px;
  text-align:center;
}

h1 { color:var(--accent); }

input {
  width:100%;
  padding:10px;
  margin:6px 0;
  border:none;
  border-radius:8px;
  background:#051017;
  color:white;
}

button {
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  margin-top:8px;
  cursor:pointer;
  font-weight:bold;
}

.primary { background:var(--accent); color:#000; }

.google-btn {
  background:#fff;
  color:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
}

.google-btn img {
  width:18px;
}

.toggle {
  margin-top:10px;
  font-size:14px;
  color:var(--muted);
  cursor:pointer;
}
</style>
</head>

<body>

<div class="card">
  <h1>Sign Up</h1>

  <button id="googleBtn" class="google-btn">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg">
    Continue with Google
  </button>

  <p style="color:#9aa7ad">or</p>

  <form id="signupForm">
    <input id="username" placeholder="Username" required>
    <input id="nickname" placeholder="Nickname" required>
    <input id="email" placeholder="Email" required>
    <input id="password" type="password" placeholder="Password" required>
    <button class="primary">Create Account</button>
  </form>

  <div class="toggle" onclick="location.href='login.html'">
    Already have account? Login
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  GoogleAuthProvider,
  signInWithPopup,
  createUserWithEmailAndPassword,
  sendEmailVerification,
  fetchSignInMethodsForEmail
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAEWxTJ1loQkXM1ShwAAF1J15RQLlCgdGM",
  authDomain: "msgapp-262c9.firebaseapp.com",
  projectId: "msgapp-262c9",
  databaseURL: "https://msgapp-262c9-default-rtdb.asia-southeast1.firebasedatabase.app"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);
const provider = new GoogleAuthProvider();

/* GOOGLE SIGNUP */
document.getElementById("googleBtn").onclick = async () => {
  try {
    const result = await signInWithPopup(auth, provider);
    const user = result.user;

    const snap = await get(ref(db, `users/${user.uid}`));

    if (!snap.exists()) {
      const username = prompt("Username:");
      const nickname = prompt("Nickname:");

      await set(ref(db, `users/${user.uid}`), {
        uid: user.uid,
        email: user.email,
        username,
        nickname,
        photoURL: user.photoURL,
        createdAt: Date.now()
      });
    }

    location.href = "index.html";
  } catch (e) {
    alert(e.message);
  }
};

/* MANUAL SIGNUP */
document.getElementById("signupForm").onsubmit = async (e) => {
  e.preventDefault();

  const username = username.value.trim();
  const nickname = nickname.value.trim();
  const email = email.value.trim();
  const password = password.value;

  try {
    const usersSnap = await get(ref(db, "users"));
    const users = usersSnap.val() || {};

    for (let id in users) {
      if (users[id].username === username) {
        throw new Error("Username already taken");
      }
    }

    const userCred = await createUserWithEmailAndPassword(auth, email, password);

    await sendEmailVerification(userCred.user);

    await set(ref(db, `users/${userCred.user.uid}`), {
      uid: userCred.user.uid,
      email,
      username,
      nickname,
      photoURL: "https://i.ibb.co/7QpKsCX/default-avatar.png",
      createdAt: Date.now()
    });

    alert("Check your email for verification!");
    location.href = "login.html";

  } catch (e) {
    alert(e.message);
  }
};
</script>

</body>
</html>
